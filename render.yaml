services:
  # Backend — Node.js Web Service
  - type: web
    name: text2sql-backend
    runtime: node
    rootDir: backend
    buildCommand: npm ci
    startCommand: node server.js
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false # set manually in Render dashboard
      - key: LLM_PROVIDER
        value: groq
      - key: CORS_ORIGIN
        sync: false # set to your frontend URL

  # Frontend — Static Site
  - type: web
    name: text2sql-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE
        sync: false # set to https://text2sql-backend.onrender.com/api
